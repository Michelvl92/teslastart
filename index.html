<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TESLA Start</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; --line:#29292c; --panel:#171719; --text:#f4f4f4; --muted:#8f8f95; --tile-w:338px; --tile-gap:21px; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; overflow-x:hidden; overflow-y:auto; background:#09090a; color:var(--text); font-family:Arial,Helvetica,sans-serif; }
    .screen { width:100%; min-height:100vh; background:radial-gradient(ellipse at 50% -20%,#242427,#101011 51%,#09090a); }
    .side,.status,.dock { display:none; }
    .brand { letter-spacing:7px; font-size:11px; color:#bbb; margin-bottom:11px; }
    .side h1 { font-weight:400; font-size:24px; letter-spacing:2px; margin:0; }
    .car { width:100%; height:150px; margin:62px 0 auto; position:relative; border-radius:14px; background:linear-gradient(145deg,#353538,#121214 65%); overflow:hidden; }
    .car:before { content:""; position:absolute; width:190px; height:75px; bottom:21px; left:23px; border-radius:56% 48% 24% 28%; transform:skewX(-13deg); background:linear-gradient(145deg,#fff,#a6a7a9 50%,#535457); box-shadow:inset 8px 8px 10px #fff8,0 14px 12px #0008; }
    .car:after { content:""; position:absolute; width:118px; height:31px; bottom:16px; left:62px; border-bottom:8px solid #09090a; border-radius:50%; box-shadow:-53px 0 0 -6px #111,54px 0 0 -6px #111; }
    .location { color:var(--muted); font-size:12px; letter-spacing:.5px; }
    .main { min-width:0; }
    .content { min-height:100vh; padding:5vh 8vw; display:flex; flex-direction:column; justify-content:center; }
    .title-wrap { text-align:center; margin:0 0 clamp(34px,7vh,82px); }
    .title { display:flex; align-items:center; justify-content:center; gap:19px; margin:0; font-weight:400; }
    .title span { font-size:clamp(27px,3.1vw,43px); letter-spacing:8px; font-weight:300; }
    .tesla { width:176px; height:31px; object-fit:contain; filter:brightness(0) invert(1); }

    .grid { width:min(calc(4 * var(--tile-w) + 3 * var(--tile-gap)),100%); margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,var(--tile-w)); justify-content:center; gap:var(--tile-gap); }
    .tile { width:var(--tile-w); aspect-ratio:16/9; padding:0; overflow:hidden; border:1px solid #323237; border-radius:4px; text-decoration:none; color:white; display:block; transition:transform .15s,filter .15s,border-color .15s; }
    .tile:hover,.tile:focus-visible { transform:scale(1.035); filter:brightness(1.2); border-color:#ddd; outline:none; z-index:1; }
    .tile.is-holding { transform:scale(1.06); border-color:#fff; box-shadow:0 0 0 2px #ffffff2c,0 13px 30px #0008; opacity:.78; z-index:3; }
    .rearrange-mode .tile { animation:tilt .18s ease-in-out infinite alternate; cursor:grabbing; }
    .rearrange-mode .tile.is-holding { animation:none; }
    @keyframes tilt { from { transform:rotate(-.4deg); } to { transform:rotate(.4deg); } }

    .tile-art { width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
    .tile-art.zoom-120 { transform:scale(1.2); }

    .fullscreen-btn { position:fixed; bottom:22px; left:26px; height:54px; display:flex; align-items:center; gap:9px; padding:0 18px 0 15px; border-radius:12px; background:var(--panel); border:1px solid var(--line); color:var(--muted); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:transform .15s,filter .15s,border-color .15s,color .15s; z-index:5; }
    .fullscreen-btn:hover,.fullscreen-btn:focus-visible { color:#fff; border-color:#ddd; transform:scale(1.045); outline:none; }
    .fullscreen-btn svg { width:18px; height:18px; flex:none; }

    @media (max-width:700px) { .content{padding:36px 20px}:root{--tile-w:280px;--tile-gap:15px}.title{gap:13px}.title span{font-size:23px;letter-spacing:5px}.tesla{width:122px}.fullscreen-btn{bottom:14px;left:14px;height:48px} }
  </style>
</head>
<body>
  <main class="screen">
    <button class="fullscreen-btn" type="button" id="fullscreenBtn" title="Reopen this page through YouTube to hide the Tesla browser bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      Fullscreen
    </button>
    <section class="main">
      <div class="content">
        <div class="title-wrap">
          <h2 class="title"><img class="tesla" src="https://upload.wikimedia.org/wikipedia/commons/6/62/Tesla_Motors_Logo.svg" alt="Tesla" /><span>START</span></h2>
        </div>
        <nav class="grid" aria-label="Website bookmarks">
          <a class="tile" href="https://www.netflix.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/netflix.jpg" alt="Netflix logo" /></a>
          <a class="tile" href="https://www.youtube.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/youtube.jpg" alt="YouTube logo" /></a>
          <a class="tile" href="https://tv.apple.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/appletv.jpg" alt="Apple TV logo" /></a>
          <a class="tile" href="https://v2.videoland.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/videoland.jpg" alt="Videoland logo" /></a>
          <a class="tile" href="https://play.hbomax.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/hbomax.jpg" alt="HBO Max logo" /></a>
          <a class="tile" href="https://www.primevideo.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/primevideo.jpg" alt="Amazon Prime Video logo" /></a>
          <a class="tile" href="https://www.skyshowtime.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/skyshowtime.jpg" alt="SkyShowtime logo" /></a>
          <a class="tile" href="https://www.disneyplus.com/nl-nl" target="_blank" rel="noopener"><img class="tile-art" src="assets/disneyplus.webp" alt="Disney+ logo" /></a>
          <a class="tile" href="https://npo.nl/start" target="_blank" rel="noopener"><img class="tile-art" src="assets/npostart.jpg" alt="NPO Start logo" /></a>
          <a class="tile" href="https://www.kijk.nl" target="_blank" rel="noopener"><img class="tile-art" src="assets/kijk.jpg" alt="KIJK logo" /></a>
          <a class="tile" href="https://web.stremio.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/stremio.jpg" alt="Stremio logo" /></a>
          <a class="tile" href="https://tv.kpn.com" target="_blank" rel="noopener"><img class="tile-art zoom-120" src="assets/kpntv.webp" alt="KPN TV+ logo" /></a>
          <a class="tile" href="https://www.xbox.com/nl-NL/play/consoles" target="_blank" rel="noopener"><img class="tile-art" src="assets/xbox.jpg" alt="Xbox logo" /></a>
          <a class="tile" href="https://www.buienradar.nl" target="_blank" rel="noopener"><img class="tile-art" src="assets/buienradar.jpg" alt="Buienradar logo" /></a>
          <a class="tile" href="https://www.windfinder.com" target="_blank" rel="noopener"><img class="tile-art" src="assets/windfinder.jpg" alt="Windfinder logo" /></a>
          <a class="tile" href="https://chargemap.com/nl-nl" target="_blank" rel="noopener"><img class="tile-art zoom-120" src="assets/chargemap.jpg" alt="Chargemap logo" /></a>
        </nav>
      </div>
    </section>
  </main>
  <script>
    // Tesla browser has no real fullscreen/chrome-hide mode, but the browser bar
    // disappears if a page is opened through YouTube's redirect endpoint. This
    // reopens the current page that way, so this bookmark grid loads chrome-free.
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      const target = encodeURIComponent(window.location.href);
      window.location.href = 'https://www.youtube.com/redirect?q=' + target;
    });

    const grid = document.querySelector('.grid');
    let heldTile = null;
    let holdTimer = null;
    let rearranging = false;
    let suppressClick = false;

    const clearHold = () => {
      clearTimeout(holdTimer);
      if (!heldTile) return;
      heldTile.classList.remove('is-holding');
      document.body.classList.remove('rearrange-mode');
      heldTile = null;
      rearranging = false;
    };

    grid.addEventListener('pointerdown', (event) => {
      const tile = event.target.closest('.tile');
      if (!tile || event.button > 0) return;
      heldTile = tile;
      holdTimer = setTimeout(() => {
        rearranging = true;
        suppressClick = true;
        tile.classList.add('is-holding');
        document.body.classList.add('rearrange-mode');
        tile.setPointerCapture?.(event.pointerId);
      }, 2000);
    });

    grid.addEventListener('pointermove', (event) => {
      if (!rearranging || !heldTile) return;
      event.preventDefault();
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest('.tile');
      if (!target || target === heldTile || !grid.contains(target)) return;
      const middle = target.getBoundingClientRect().left + target.offsetWidth / 2;
      grid.insertBefore(heldTile, event.clientX > middle ? target.nextSibling : target);
    });

    grid.addEventListener('pointerup', clearHold);
    grid.addEventListener('pointercancel', clearHold);
    grid.addEventListener('pointerleave', (event) => { if (!rearranging) clearTimeout(holdTimer); });
    grid.addEventListener('click', (event) => {
      if (!suppressClick) return;
      event.preventDefault();
      suppressClick = false;
    }, true);
  </script>
</body>
</html>
